<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Day 1: Data Source Test</title>
<style>
  body { font-family: monospace; padding: 16px; background: #111; color: #eee; }
  h3 { color: #4ea1ff; }
  pre { background: #222; padding: 10px; border-radius: 6px; white-space: pre-wrap; word-break: break-word; }
  .ok { color: #4caf50; }
  .fail { color: #ff5252; }
</style>
</head>
<body>
  <h2>Day 1: Can we reach the data we need?</h2>

  <h3>Test 1: Bitget (crypto futures) - direct</h3>
  <pre id="bitget-direct">testing...</pre>

  <h3>Test 2: Bitget - via free CORS proxy (fallback)</h3>
  <pre id="bitget-proxy">testing...</pre>

  <h3>Test 3: Frankfurter (forex, e.g. EUR/USD)</h3>
  <pre id="fx">testing...</pre>

  <script>
    // Test 1: direct Bitget call
    fetch("https://api.bitget.com/api/v2/mix/market/ticker?symbol=BTCUSDT&productType=usdt-futures")
      .then(r => r.json())
      .then(d => {
        document.getElementById("bitget-direct").innerHTML =
          '<span class="ok">SUCCESS - direct connection works</span>\n' + JSON.stringify(d, null, 2).slice(0, 300);
      })
      .catch(e => {
        document.getElementById("bitget-direct").innerHTML =
          '<span class="fail">BLOCKED (expected if CORS restricted): ' + e + '</span>';
      });

    // Test 2: via free CORS proxy fallback
    fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent("https://api.bitget.com/api/v2/mix/market/ticker?symbol=BTCUSDT&productType=usdt-futures"))
      .then(r => r.json())
      .then(d => {
        document.getElementById("bitget-proxy").innerHTML =
          '<span class="ok">SUCCESS via proxy</span>\n' + JSON.stringify(d, null, 2).slice(0, 300);
      })
      .catch(e => {
        document.getElementById("bitget-proxy").innerHTML =
          '<span class="fail">FAILED: ' + e + '</span>';
      });

    // Test 3: Frankfurter for forex pairs
    fetch("https://api.frankfurter.dev/v1/latest?base=EUR&symbols=USD")
      .then(r => r.json())
      .then(d => {
        document.getElementById("fx").innerHTML =
          '<span class="ok">SUCCESS</span>\n' + JSON.stringify(d, null, 2);
      })
      .catch(e => {
        document.getElementById("fx").innerHTML =
          '<span class="fail">FAILED: ' + e + '</span>';
      });
  </script>
</body>
</html>
